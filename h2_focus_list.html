    --red: #ef4444;
    --amber: #f59e0b;
    --green: #10b981;
    --text: #1e293b;
    --muted: #64748b;

    --pill-acc-text: #ea580c;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header-top h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  .header-meta { font-size: 11px; color: #94a3b8; margin-left: auto; white-space: nowrap; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-wrap input { width: 100%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 7px 12px 7px 32px; color: white; font-size: 13px; outline: none; transition: background .2s; }
  .search-wrap input::placeholder { color: #94a3b8; }
  .search-wrap input:focus { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.3); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.2); background: transparent; color: rgba(255,255,255,.75); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:hover, .btn.active { background: rgba(255,255,255,.15); color: white; border-color: rgba(255,255,255,.4); }
  .btn.active { font-weight: 600; }
  .sort-select { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 8px; padding: 6px 10px; color: white; font-size: 12px; cursor: pointer; outline: none; }
  .sort-select option { background: #1e293b; color: white; }
  .legend { font-size: 11px; color: #94a3b8; white-space: nowrap; padding: 6px 0; }
  .stats { display: flex; gap: 16px; margin-left: auto; }
  .stat { text-align: center; }
  .stat-n { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat-l { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Grid ── */
  .grid-container { padding: 20px 24px; }
  .count-bar { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; align-items: start; }

  /* ── Card ── */
  .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); transition: box-shadow .2s; border: 1px solid var(--border); overflow: hidden; }

  .card-summary { padding: 16px; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .traffic-light { font-size: 20px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
  .account-name { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; }
  .priority-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-top: 3px; }
  .pill-bb { background: var(--pill-bb); color: var(--pill-bb-text); }
  .pill-acc { background: var(--pill-acc); color: var(--pill-acc-text); }
  .pill-up { background: var(--pill-up); color: var(--pill-up-text); }
  .expand-icon { font-size: 12px; color: var(--muted); flex-shrink: 0; margin-top: 3px; transition: transform .2s; }
  .card.expanded .expand-icon { transform: rotate(180deg); }

  .card-kpis { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .kpi { background: var(--bg); border-radius: 8px; padding: 8px 10px; }
  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
  .kpi-value { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .kpi-value.hours-val { color: var(--accent); }
  .kpi-btn { cursor: pointer; }
  .kpi-btn:hover { background: #eef2ff; border: 1px solid #c7d2fe; }

  .card-use-cases { margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; gap: 6px; }
  .last-activity { font-size: 11px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plan-btn { font-size: 11px; color: var(--accent); text-decoration: none; padding: 3px 8px; border: 1px solid #e0e7ff; border-radius: 6px; white-space: nowrap; }
  .plan-btn:hover { background: #eef2ff; }
  .org62-btn { font-size: 11px; color: var(--muted); text-decoration: none; padding: 3px 8px; border: 1px solid var(--border); border-radius: 6px; white-space: nowrap; }
  .org62-btn:hover { background: var(--bg); color: var(--text); }
  .blocker-badge { font-size: 11px; color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 3px 7px; white-space: nowrap; cursor: pointer; }
  .blocker-badge:hover { background: #fee2e2; }
  .blocker-popup-overlay { display: none; position: fixed; inset: 0; z-index: 200; }
  .blocker-popup { position: fixed; z-index: 201; background: white; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.18); padding: 14px 16px; max-width: 320px; border: 1px solid #fecaca; }
  .blocker-popup-title { font-size: 12px; font-weight: 700; color: #b91c1c; margin-bottom: 8px; }
  .blocker-popup ul { list-style: none; margin: 0; padding: 0; }
  .blocker-popup li { font-size: 12px; color: #1e293b; padding: 4px 0 4px 16px; position: relative; line-height: 1.4; border-bottom: 1px solid #fef2f2; }
  .blocker-popup li:last-child { border-bottom: none; }
  .blocker-popup li::before { content: '⚠️'; position: absolute; left: 0; font-size: 10px; top: 5px; }

  /* ── Action buttons ── */
  .card-actions { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .popup-btn { font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .popup-btn:hover { background: #eef2ff; border-color: #c7d2fe; color: var(--accent); }

  /* ── Generic popup (positioned near click target) ── */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; }
  .modal-overlay.open { display: block; }
  .modal { position: fixed; z-index: 201; background: white; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.18); border: 1px solid var(--border); width: 300px; max-width: calc(100vw - 24px); max-height: 70vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { display: flex; align-items: center; padding: 10px 12px 8px; border-bottom: 1px solid var(--border); gap: 8px; }
  .modal-title { font-size: 13px; font-weight: 700; flex: 1; }
  .modal-subtitle { font-size: 11px; color: var(--muted); }
  .modal-close { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--muted); line-height: 1; padding: 0 2px; }

  .modal-body { padding: 10px 12px; overflow-y: auto; }
  .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 10px 0 5px; }

  .no-data { font-size: 12px; color: var(--muted); font-style: italic; }

  .hidden { display: none !important; }

  /* ── Scrollbar ── */

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>

function setFilter(type, btn) {
  if (type === 'priority') {
    priorityFilter = btn.dataset.priority;
    document.querySelectorAll('#priority-filters .btn').forEach(b => b.classList.remove('active'));
  } else {
    trafficFilter = btn.dataset.traffic;
    document.querySelectorAll('#traffic-filters .btn').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  renderCards();
}

function getStatusClass(s) {
  const m = s.toLowerCase();
  if (m.includes('prod')) return 'prod';
  if (m.includes('test')) return 'testing';
  if (m.includes('dev')) return 'dev';
  if (m.includes('scop')) return 'scoping';
  if (m.includes('poc')) return 'poc';
  return 'ideate';
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const sortEl = document.getElementById('sort-select');
  const sort = sortEl ? sortEl.value : 'hours';

  let list = ACCOUNTS.filter(a => {
    if (priorityFilter !== 'all' && a.priority !== priorityFilter) return false;
    if (trafficFilter !== 'all' && a.tl !== trafficFilter) return false;
    if (q && !a.name.toLowerCase().includes(q) && !a.team.core.toLowerCase().includes(q) && !a.useCases.some(u => u.name.toLowerCase().includes(q))) return false;
    return true;
  });

  list = [...list].sort((a, b) => {
    if (sort === 'hours') return parseFloat(b.hours.replace(/[^0-9.]/g,'') || 0) - parseFloat(a.hours.replace(/[^0-9.]/g,'') || 0);
    if (sort === 'priority') return statusOrder[a.priority] - statusOrder[b.priority];
    return a.name.localeCompare(b.name);
  });

  const green = list.filter(a => a.tl === '🟢').length;
  const amber = list.filter(a => a.tl === '🟡').length;
  const red = list.filter(a => a.tl === '🔴').length;
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-green').textContent = green;
  document.getElementById('stat-amber').textContent = amber;
  document.getElementById('stat-red').textContent = red;
  document.getElementById('count-bar').textContent = `Showing ${list.length} of ${ACCOUNTS.length} accounts`;

  const grid = document.getElementById('card-grid');
  grid.innerHTML = list.map((a, idx) => {
    const pillClass = a.priority === 'Big Bet' ? 'pill-bb' : a.priority === 'Accelerator' ? 'pill-acc' : 'pill-up';
    const hasQ2 = a.useCases.some(u => u.q2);
    const encA = encodeURIComponent(JSON.stringify(a));

    const planBtn = a.planUrl ? `<a class="plan-btn" href="${a.planUrl}" target="_blank" onclick="event.stopPropagation()">📄 Consumption Plan</a>` : '';
    const org62Btn = a.org62Url ? `<a class="org62-btn" href="${a.org62Url}" target="_blank" onclick="event.stopPropagation()">🔗 org62</a>` : '';

    return `
<div class="card" id="card-${idx}">
  <div class="card-summary">
    <div class="card-header">
      <div class="traffic-light">${a.tl}</div>
      <div style="flex:1">
        <div class="account-name">${hasQ2 ? '<span class="q2-star" title="Q2 use case going live">⭐</span> ' : ''}${a.name}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;">
          <span class="priority-pill ${pillClass}">${a.priority}</span>
          ${a.blockers.length ? `<span class="blocker-badge" onclick="showBlockers(event, this)" data-blockers="${encodeURIComponent(JSON.stringify(a.blockers))}" data-name="${a.name}">⚠️ ${a.blockers.length} blocker${a.blockers.length > 1 ? 's' : ''}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="card-kpis">
      <div class="kpi kpi-btn" onclick="showModal(event,'activity','${encodeURIComponent(a.name)}')" title="Click to see activities"><div class="kpi-label">FY27 Hours</div><div class="kpi-value hours-val">${a.hours}</div></div>
      <div class="kpi"><div class="kpi-label">CCR YTD (AF/D360)</div><div class="kpi-value" style="font-size:11px">${a.ccrYtd}</div></div>
      <div class="kpi"><div class="kpi-label">H1 Forecast</div><div class="kpi-value" style="font-size:11px">${a.h1Fcst}</div></div>
    </div>
    <div class="card-actions">
      <button class="popup-btn" onclick="showModal(event,'uc','${encodeURIComponent(a.name)}')">🎯 Use Cases (${a.useCases.length})</button>
      <button class="popup-btn" onclick="showModal(event,'team','${encodeURIComponent(a.name)}')">👥 Team</button>
      <button class="popup-btn" onclick="showModal(event,'steps','${encodeURIComponent(a.name)}')">→ Next Steps</button>
    </div>
    <div class="card-footer">
      ${planBtn}${org62Btn}
    </div>
  </div>
</div>`;
  }).join('');
}

function showModal(event, type, encodedName) {
  event.stopPropagation();
  const name = decodeURIComponent(encodedName);
  const a = ACCOUNTS.find(x => x.name === name);
  if (!a) return;

  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal-popup');
  const title = document.getElementById('modal-title');
  const subtitle = document.getElementById('modal-subtitle');
  const body = document.getElementById('modal-body');

  title.textContent = a.name;
  body.textContent = '';

  if (type === 'uc') {
    subtitle.textContent = `Use Cases (${a.useCases.length})`;
    a.useCases.forEach(u => {
      const sc = getStatusClass(u.status);
      const item = document.createElement('div');
      item.className = 'use-case-item';
      item.style.marginBottom = '8px';
      const badge = document.createElement('span');
      badge.className = `uc-badge badge-${sc}`;
      badge.textContent = u.status;
      const nameSpan = document.createElement('span');
      nameSpan.className = 'uc-name';
      nameSpan.textContent = u.name;
      if (u.q2) { const star = document.createElement('span'); star.className = 'q2-star'; star.textContent = ' ⭐'; nameSpan.appendChild(star); }
      item.appendChild(badge);
      item.appendChild(nameSpan);
      if (u.date) { const d = document.createElement('span'); d.className = 'uc-date'; d.textContent = u.date; item.appendChild(d); }
      body.appendChild(item);
    });

  } else if (type === 'team') {
    subtitle.textContent = 'Team';
    const table = document.createElement('table');
    table.className = 'team-table';
    [['Core AE', a.team.core], ['AF AE', a.team.af], ['D360 AE', a.team.d360], ['CSM', a.team.csm], ['Partner', a.team.partner]].forEach(([label, val]) => {
      const tr = document.createElement('tr');
      const td1 = document.createElement('td'); td1.textContent = label;
      const td2 = document.createElement('td'); td2.textContent = val;
      tr.appendChild(td1); tr.appendChild(td2); table.appendChild(tr);
    });
    body.appendChild(table);

  } else if (type === 'steps') {
    subtitle.textContent = 'Next Steps';
    const ul = document.createElement('ul');
    ul.className = 'steps-list';
    if (a.nextSteps.length) {
      a.nextSteps.forEach(s => { const li = document.createElement('li'); li.textContent = s; ul.appendChild(li); });
    } else {
      const li = document.createElement('li'); li.textContent = 'No next steps recorded.'; li.className = 'no-data'; ul.appendChild(li);
    }
    body.appendChild(ul);

  } else if (type === 'activity') {
    subtitle.textContent = 'Latest Activities · ' + a.hours;
    const ul = document.createElement('ul');
    ul.className = 'activity-list';
    if (a.activities.length) {
      a.activities.forEach(s => { const li = document.createElement('li'); li.textContent = s; ul.appendChild(li); });
    } else {
      const li = document.createElement('li'); li.textContent = 'No qualifying activities on record'; li.className = 'no-data'; ul.appendChild(li);
    }
    body.appendChild(ul);
  }

  // Position near the clicked button
  const rect = event.currentTarget.getBoundingClientRect();
  overlay.classList.add('open');
  const popupW = 300;
  let left = rect.left;
  if (left + popupW > window.innerWidth - 12) left = window.innerWidth - popupW - 12;
  let top = rect.bottom + 6;
  modal.style.left = left + 'px';
  modal.style.top = top + 'px';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

renderCards();

function showBlockers(event, el) {
  event.stopPropagation();
  const blockers = JSON.parse(decodeURIComponent(el.dataset.blockers));
  const name = el.dataset.name;
  const title = document.getElementById('blocker-popup-title');
  title.textContent = name + ' — Blockers';
  const list = document.getElementById('blocker-popup-list');
  list.textContent = '';
  blockers.forEach(b => {
    const li = document.createElement('li');
    li.textContent = b;
    list.appendChild(li);
  });
  const popup = document.getElementById('blocker-popup');
  const overlay = document.getElementById('blocker-overlay');
  const rect = el.getBoundingClientRect();
  popup.style.display = 'block';
  overlay.style.display = 'block';
  const popupW = 320;
  let left = rect.left;
  if (left + popupW > window.innerWidth - 12) left = window.innerWidth - popupW - 12;
  popup.style.left = left + 'px';
  popup.style.top = (rect.bottom + 6) + 'px';
}

function closeBlockerPopup() {
  document.getElementById('blocker-popup').style.display = 'none';
  document.getElementById('blocker-overlay').style.display = 'none';
}
</script>
</body>
</html>
